<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>نسيت كلمة المرور - استعادة الحساب | رحلة في مصر</title>
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Vv4ZY0nw/Logo.webp">
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/Vv4ZY0nw/Logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #D4AF37, #B8860B);
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-primary: #2c1810;
            --text-secondary: #5c3a2a;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: rgba(30, 30, 50, 0.98);
            --text-primary: #f0e6d2;
            --text-secondary: #d4a373;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            transition: background 0.3s ease;
        }
        
        .forgot-container {
            width: 100%;
            max-width: 500px;
        }
        
        .forgot-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .forgot-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .forgot-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 1rem;
            border: 3px solid #D4AF37;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .forgot-header h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .forgot-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 1.2rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .input-group {
            position: relative;
        }
        
        .input-group i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #D4AF37;
            font-size: 1.1rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 1rem 3rem 1rem 1rem;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            background: transparent;
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        
        .reset-btn {
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            color: #2c1810;
            border: none;
            padding: 1rem;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .message {
            padding: 0.8rem;
            border-radius: 12px;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        
        .error-message {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: #fff;
        }
        
        .success-message {
            background: linear-gradient(135deg, #4caf50, #388e3c);
            color: #fff;
        }
        
        .info-message {
            background: linear-gradient(135deg, #2196f3, #1976d2);
            color: #fff;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
        }
        
        .back-link a {
            color: #D4AF37;
            text-decoration: none;
            font-weight: 600;
        }
        
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            font-size: 1.3rem;
            transition: all 0.3s;
        }
        
        .dark-mode-toggle:hover {
            background: #D4AF37;
            transform: scale(1.05);
        }
        
        @media (max-width: 500px) {
            body {
                padding: 1rem;
            }
            .forgot-card {
                padding: 1.8rem;
            }
            .forgot-header h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <button class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>
    
    <div class="forgot-container">
        <div class="forgot-card">
            <div class="forgot-header">
                <img src="https://i.postimg.cc/Vv4ZY0nw/Logo.webp" alt="Logo" class="forgot-logo">
                <h2>🔐 نسيت كلمة المرور؟</h2>
                <p>أدخل بريدك الإلكتروني وسنرسل لك بيانات الدخول الجديدة</p>
            </div>
            <form id="forgotForm">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="example@email.com" required>
                    </div>
                </div>
                <button type="submit" class="reset-btn">
                    <i class="fas fa-paper-plane"></i> إرسال البيانات
                </button>
                <div id="forgotMessage" class="message"></div>
            </form>
            <div class="back-link">
                <a href="login"><i class="fas fa-arrow-right"></i> العودة إلى تسجيل الدخول</a>
            </div>
        </div>
    </div>

    <script>
        function initDarkMode() {
            const btn = document.getElementById('darkModeToggle');
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
                btn.innerHTML = '<i class="fas fa-sun"></i>';
            }
            btn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkNow = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkNow);
                btn.innerHTML = isDarkNow ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }

        const forgotForm = document.getElementById('forgotForm');
        if (forgotForm) {
            forgotForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const messageDiv = document.getElementById('forgotMessage');
                const submitBtn = forgotForm.querySelector('button[type="submit"]');
                
                // تعطيل الزر أثناء الإرسال
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
                
                try {
                    const response = await fetch('/api/forgot-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        messageDiv.textContent = '✅ ' + data.message;
                        messageDiv.className = 'message success-message';
                        messageDiv.style.display = 'block';
                        forgotForm.reset();
                    } else {
                        messageDiv.textContent = '❌ ' + (data.error || 'حدث خطأ');
                        messageDiv.className = 'message error-message';
                        messageDiv.style.display = 'block';
                        setTimeout(() => messageDiv.style.display = 'none', 4000);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    messageDiv.textContent = '❌ حدث خطأ في الاتصال بالخادم';
                    messageDiv.className = 'message error-message';
                    messageDiv.style.display = 'block';
                    setTimeout(() => messageDiv.style.display = 'none', 4000);
                } finally {
                    // إعادة تفعيل الزر
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال البيانات';
                }
            });
        }
        
        initDarkMode();
    </script>
</body>
</html>
