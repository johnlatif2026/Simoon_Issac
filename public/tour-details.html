<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>رحلة الخلود | اكتشف عظمة مصر - جولة الأهرامات والأقصر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.0/css/lightgallery-bundle.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #D4AF37;
            --gold-dark: #B8860B;
            --gold-light: #FFE4A0;
            --beige: #F9F3E2;
            --brown-light: #D2B48C;
            --brown: #5C3A2A;
            --brown-dark: #2C1810;
            --white: #FFFFFF;
            --shadow-sm: 0 5px 20px rgba(0,0,0,0.08);
            --shadow-md: 0 10px 30px rgba(0,0,0,0.12);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.15);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.dark-mode {
            --beige: #1E1E2A;
            --brown-light: #2A2A3A;
            --white: #252535;
            --brown-dark: #D4AF37;
            --brown: #E8D8B0;
            color: #E8E8F0;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--beige);
            color: var(--brown-dark);
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(44, 24, 16, 0.96);
            backdrop-filter: blur(12px);
            z-index: 1000;
            padding: 0.8rem 0;
            transition: var(--transition);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        .navbar.scrolled { padding: 0.4rem 0; background: rgba(44, 24, 16, 0.98); }
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }
        .nav-logo { display: flex; align-items: center; gap: 0.8rem; }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); }
        .logo-text { font-size: 1.4rem; font-weight: 800; background: linear-gradient(135deg, #D4AF37, #FFD700); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-menu { display: flex; list-style: none; gap: 2rem; }
        .nav-menu a { color: #F9F3E2; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .nav-menu a:hover { color: var(--gold); }
        .nav-controls { display: flex; gap: 0.8rem; align-items: center; }
        .icon-btn, .lang-btn {
            background: rgba(212, 175, 55, 0.15);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            cursor: pointer;
            color: var(--gold);
            transition: 0.3s;
        }
        .lang-btn { border-radius: 30px; width: auto; padding: 0 1rem; font-weight: 600; background: rgba(212, 175, 55, 0.2); }
        .icon-btn:hover, .lang-btn:hover { background: var(--gold); color: #2C1810; transform: scale(1.05); }
        .nav-toggle { display: none; cursor: pointer; flex-direction: column; gap: 5px; }
        .nav-toggle span { width: 28px; height: 3px; background: var(--gold); transition: 0.3s; }
        
        /* Main Container */
        .main-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            padding: 100px 2rem 3rem;
        }
        
        /* Layout Grid */
        .tour-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
        }
        
        @media (max-width: 992px) {
            .tour-grid { grid-template-columns: 1fr; }
            .sticky-card { position: relative !important; top: 0 !important; }
        }
        
        /* Gallery Section */
        .gallery-section {
            background: var(--white);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            margin-bottom: 2rem;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .main-swiper { width: 100%; height: 450px; }
        .main-swiper img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: transform 0.5s; }
        .thumb-swiper { margin-top: 12px; height: 100px; padding: 0 10px; }
        .thumb-swiper .swiper-slide { width: 100px; height: 80px; opacity: 0.5; cursor: pointer; border-radius: 12px; overflow: hidden; border: 2px solid transparent; transition: 0.3s; }
        .thumb-swiper .swiper-slide-thumb-active { opacity: 1; border-color: var(--gold); }
        .thumb-swiper img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Itinerary Timeline */
        .itinerary-section, .inclusions-section, .reviews-section, .faq-section {
            background: var(--white);
            border-radius: 28px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }
        .section-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            position: relative;
            display: inline-block;
        }
        .section-title:after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 0;
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--gold-dark));
            border-radius: 3px;
        }
        .timeline-item {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px dashed rgba(212, 175, 55, 0.3);
        }
        .timeline-day {
            min-width: 80px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #2C1810;
            font-weight: 800;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            text-align: center;
            height: fit-content;
        }
        .timeline-content h4 { color: var(--gold); margin-bottom: 0.5rem; }
        
        /* Inclusions List */
        .inclusion-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .inc-box { display: flex; gap: 1rem; align-items: center; padding: 1rem; background: rgba(212, 175, 55, 0.08); border-radius: 20px; }
        .inc-box i { font-size: 2rem; color: var(--gold); }
        .inc-box ul { list-style: none; }
        .inc-box li { margin: 0.5rem 0; display: flex; align-items: center; gap: 0.5rem; }
        .inc-exclude i { color: #e67e22; }
        
        /* Reviews */
        .review-card {
            background: rgba(212, 175, 55, 0.05);
            padding: 1.2rem;
            border-radius: 20px;
            margin-bottom: 1rem;
        }
        .review-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.8rem; }
        .stars i { color: #FFB800; margin-left: 2px; }
        
        /* FAQ Accordion */
        .faq-item {
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            margin-bottom: 1rem;
        }
        .faq-question {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }
        .faq-question:hover { color: var(--gold); }
        .faq-answer { max-height: 0; overflow: hidden; transition: 0.4s ease; padding-right: 1rem; color: var(--brown); }
        .faq-item.active .faq-answer { max-height: 200px; padding-bottom: 1rem; }
        
        /* Sticky Booking Card */
        .sticky-card {
            position: sticky;
            top: 100px;
            background: var(--white);
            border-radius: 28px;
            padding: 1.8rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--gold);
            transition: var(--transition);
        }
        .price-big { font-size: 2.2rem; font-weight: 800; color: var(--gold); }
        .trust-badges { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1.5rem 0; justify-content: center; }
        .trust-badge { background: rgba(212, 175, 55, 0.1); padding: 0.5rem 1rem; border-radius: 40px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
        .form-control { width: 100%; padding: 0.9rem; margin-bottom: 1rem; border: 2px solid rgba(212, 175, 55, 0.3); border-radius: 16px; background: var(--beige); color: var(--brown-dark); font-family: 'Cairo'; transition: 0.3s; }
        .form-control:focus { border-color: var(--gold); outline: none; }
        .btn-gold {
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 40px;
            font-weight: 800;
            font-size: 1.1rem;
            color: #2C1810;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-gold:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }
        .whatsapp-fixed {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: #25D366;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            z-index: 999;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            text-decoration: none;
        }
        .whatsapp-fixed:hover { transform: scale(1.1); }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.6s ease forwards; }
        @media (max-width: 768px) {
            .main-wrapper { padding: 85px 1rem 2rem; }
            .main-swiper { height: 280px; }
            .inclusion-grid { grid-template-columns: 1fr; }
            .nav-menu { position: fixed; top: 70px; right: -100%; width: 80%; height: 100vh; background: #2C1810; flex-direction: column; padding: 2rem; transition: 0.4s; }
            .nav-menu.active { right: 0; }
            .nav-toggle { display: flex; }
        }
        footer {
            background: #2C1810;
            color: #F9F3E2;
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo"><img src="https://i.postimg.cc/Vv4ZY0nw/Logo.webp" class="logo-img" alt="Logo"><span class="logo-text" data-key="logo">رحلة في مصر</span></div>
            <ul class="nav-menu"><li><a href="#" data-key="nav_home">الرئيسية</a></li><li><a href="#" data-key="nav_tours">الجولات</a></li><li><a href="#" data-key="nav_contact">اتصل بنا</a></li></ul>
            <div class="nav-controls"><button class="icon-btn" id="darkModeBtn"><i class="fas fa-moon"></i></button><button class="lang-btn" id="langBtn">🇬🇧 EN</button><div class="nav-toggle"><span></span><span></span><span></span></div></div>
        </div>
    </nav>

    <div class="main-wrapper">
        <div class="tour-grid">
            <div>
                <!-- Gallery -->
                <div class="gallery-section fade-up">
                    <div class="swiper main-swiper" id="mainSwiper"><div class="swiper-wrapper"></div><div class="swiper-button-next"></div><div class="swiper-button-prev"></div></div>
                    <div class="swiper thumb-swiper" id="thumbSwiper"><div class="swiper-wrapper"></div></div>
                </div>
                
                <!-- Itinerary -->
                <div class="itinerary-section fade-up"><h2 class="section-title" data-key="itinerary">برنامج الرحلة</h2><div id="itineraryContainer"></div></div>
                
                <!-- Inclusions -->
                <div class="inclusions-section fade-up"><h2 class="section-title" data-key="inclusions">يشمل / لا يشمل</h2><div class="inclusion-grid" id="inclusionsContainer"></div></div>
                
                <!-- Reviews -->
                <div class="reviews-section fade-up"><h2 class="section-title" data-key="reviews">تقييمات العملاء</h2><div id="reviewsContainer"></div></div>
                
                <!-- FAQ -->
                <div class="faq-section fade-up"><h2 class="section-title" data-key="faq">الأسئلة الشائعة</h2><div id="faqContainer"></div></div>
            </div>
            
            <!-- Sticky Booking Card -->
            <div><div class="sticky-card" id="stickyBookingCard"><h3 style="color:var(--gold); margin-bottom:1rem;" data-key="bookNow">📅 احجز الآن</h3><div class="price-big" id="priceDisplay">$120 <span style="font-size:1rem;">/ للشخص</span></div><div class="trust-badges"><span class="trust-badge"><i class="fas fa-lock"></i> <span data-key="secure">دفع آمن</span></span><span class="trust-badge"><i class="fas fa-bolt"></i> <span data-key="instant">حجز فوري</span></span><span class="trust-badge"><i class="fab fa-whatsapp"></i> <span data-key="support">دعم 24/7</span></span><span class="trust-badge"><i class="fas fa-star"></i> 4.9 <span data-key="rating">تقييمات عالية</span></span></div>
                <form id="bookingFormSticky"><select id="nationalitySticky" class="form-control"><option value="egyptian">🇪🇬 مصري / عربي</option><option value="foreign">🌍 أجنبي</option></select><input type="number" id="personsSticky" value="1" min="1" class="form-control" placeholder="عدد الأفراد"><input type="date" id="dateSticky" class="form-control"><input type="text" id="nameSticky" class="form-control" placeholder="الاسم الكامل"><input type="email" id="emailSticky" class="form-control" placeholder="البريد الإلكتروني"><input type="tel" id="phoneSticky" class="form-control" placeholder="رقم الهاتف"><button type="submit" class="btn-gold">✅ تأكيد الحجز الفوري</button></form><small style="display:block; text-align:center; margin-top:1rem;">🔒 بياناتك مشفرة 100%</small></div></div>
        </div>
    </div>
    <a href="https://wa.me/201229971386" class="whatsapp-fixed" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <footer><p data-key="copyright">© 2026 رحلة في مصر مع سيمون - جولات استثنائية</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.0/lightgallery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.0/plugins/thumbnail/lg-thumbnail.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.0/plugins/zoom/lg-zoom.min.js"></script>
    <script>
        // Tour Data
        const tourData = {
            name: "أسطورة الفراعنة - الأهرامات وأبو سمبل",
            priceEgyptian: 3800,
            priceForeign: 120,
            images: [
                "https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?w=1200",
                "https://images.unsplash.com/photo-1547971423-c5e15fb4f6d2?w=1200",
                "https://images.unsplash.com/photo-1560625507-68f5be37ed0b?w=1200",
                "https://images.unsplash.com/photo-1572252009286-8b932f9e3f1e?w=1200"
            ],
            itinerary: [
                { day: "اليوم الأول", title: "القاهرة - الأهرامات", desc: "زيارة أهرامات الجيزة وأبو الهول، متحف الآثار المصرية، العشاء في مطعم محلي." },
                { day: "اليوم الثاني", title: "أسوان - معبد فيلة", desc: "رحلة إلى معبد فيلة والسد العالي، قوارب تقليدية." },
                { day: "اليوم الثالث", title: "أبو سمبل", desc: "معابد رمسيس الثاني ونفرتاري، عودة إلى الأقصر." }
            ],
            includes: ["مرشد سياحي معتمد", "وجبات غذاء (حلال)", "تذاكر دخول المواقع", "فندق 5 نجوم إقامة كاملة", "نقل VIP مكيف", "زجاجة مياه يومياً"],
            excludes: ["الطيران الدولي", "التأشيرة", "المشروبات الغازية", "الإكراميات", "الأنشطة الإضافية"],
            reviews: [
                { name: "أحمد محمد", stars: 5, comment: "رحلة لا تُنسى، المرشد كان ممتاز والأماكن ساحرة!" },
                { name: "Sarah J.", stars: 5, comment: "تنظيم رائع، الخدمات فاخرة، أنصح به بشدة." },
                { name: "Liam O.", stars: 4, comment: "تجربة ثقافية مذهلة، الالتزام بالمواعيد ممتاز." }
            ],
            faq: [
                { q: "هل يمكن إلغاء الحجز؟", a: "يمكن الإلغاء المجاني قبل 48 ساعة من الرحلة." },
                { q: "هل الدفع آمن؟", a: "نعم، نستخدم بوابات دفع مشفرة 100%." },
                { q: "مدة الجولة كاملة؟", a: "ثلاثة أيام كاملة مع إقامة." }
            ]
        };
        
        // ---- LightGallery ----
        function initLightGallery() {
            const galleryItems = document.querySelectorAll('.main-swiper .swiper-slide img');
            if (galleryItems.length && typeof lightGallery !== 'undefined') {
                lightGallery(document.getElementById('mainSwiper'), {
                    selector: '.swiper-slide img',
                    plugins: [lgZoom, lgThumbnail],
                    speed: 500,
                    thumbnail: true
                });
            }
        }
        
        // Render Swiper Gallery
        let mainSwiper, thumbSwiper;
        function renderGallery(images) {
            const mainWrapper = document.querySelector('#mainSwiper .swiper-wrapper');
            const thumbWrapper = document.querySelector('#thumbSwiper .swiper-wrapper');
            mainWrapper.innerHTML = ''; thumbWrapper.innerHTML = '';
            images.forEach((img, idx) => {
                mainWrapper.innerHTML += `<div class="swiper-slide"><img src="${img}" alt="Egypt tour ${idx}" data-src="${img}"></div>`;
                thumbWrapper.innerHTML += `<div class="swiper-slide"><img src="${img}" alt="thumb"></div>`;
            });
            if (mainSwiper) mainSwiper.destroy(true, true);
            if (thumbSwiper) thumbSwiper.destroy(true, true);
            mainSwiper = new Swiper('.main-swiper', { loop: true, navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' }, thumbs: { swiper: null } });
            thumbSwiper = new Swiper('.thumb-swiper', { loop: false, spaceBetween: 10, slidesPerView: 4, freeMode: true, watchSlidesProgress: true });
            mainSwiper.params.thumbs.swiper = thumbSwiper;
            mainSwiper.thumbs.init();
            setTimeout(() => initLightGallery(), 200);
        }
        
        // Render Itinerary
        function renderItinerary(itinerary) {
            document.getElementById('itineraryContainer').innerHTML = itinerary.map(i => `
                <div class="timeline-item"><div class="timeline-day">${i.day}</div><div class="timeline-content"><h4>${i.title}</h4><p>${i.desc}</p></div></div>
            `).join('');
        }
        
        // Inclusions / Exclusions
        function renderInclusions(includes, excludes) {
            document.getElementById('inclusionsContainer').innerHTML = `
                <div class="inc-box"><i class="fas fa-check-circle" style="color:#D4AF37"></i><ul><li style="font-weight:700">✅ يشمل السعر</li>${includes.map(i => `<li>✔️ ${i}</li>`).join('')}</ul></div>
                <div class="inc-box inc-exclude"><i class="fas fa-times-circle" style="color:#e67e22"></i><ul><li style="font-weight:700">❌ لا يشمل السعر</li>${excludes.map(e => `<li>✖️ ${e}</li>`).join('')}</ul></div>
            `;
        }
        
        // Reviews with stars
        function renderReviews(reviews) {
            document.getElementById('reviewsContainer').innerHTML = reviews.map(r => `
                <div class="review-card"><div class="review-header"><div class="stars">${'<i class="fas fa-star"></i>'.repeat(r.stars)}${'<i class="far fa-star"></i>'.repeat(5-r.stars)}</div><strong>${r.name}</strong></div><p>${r.comment}</p></div>
            `).join('');
        }
        
        // FAQ Accordion
        function renderFAQ(faqs) {
            const container = document.getElementById('faqContainer');
            container.innerHTML = faqs.map((f, idx) => `
                <div class="faq-item" data-idx="${idx}"><div class="faq-question">${f.q} <i class="fas fa-chevron-down"></i></div><div class="faq-answer">${f.a}</div></div>
            `).join('');
            document.querySelectorAll('.faq-item').forEach(item => {
                item.querySelector('.faq-question').addEventListener('click', () => {
                    item.classList.toggle('active');
                    const icon = item.querySelector('.faq-question i');
                    icon.classList.toggle('fa-chevron-up');
                });
            });
        }
        
        // Price display & update on nationality
        function updatePriceDisplay() {
            const nationality = document.getElementById('nationalitySticky').value;
            const price = nationality === 'egyptian' ? tourData.priceEgyptian : tourData.priceForeign;
            const currency = nationality === 'egyptian' ? 'جنيه' : '$';
            document.getElementById('priceDisplay').innerHTML = `${currency} ${price} <span style="font-size:1rem;">/ للشخص</span>`;
        }
        
        // Booking Handler + WhatsApp simulation (storing & alert)
        function handleBooking(e) {
            e.preventDefault();
            const nationality = document.getElementById('nationalitySticky').value;
            const persons = parseInt(document.getElementById('personsSticky').value);
            const name = document.getElementById('nameSticky').value.trim();
            const email = document.getElementById('emailSticky').value.trim();
            const phone = document.getElementById('phoneSticky').value.trim();
            const date = document.getElementById('dateSticky').value;
            if (!name || !email || !phone || !date) { alert('❌ الرجاء تعبئة جميع الحقول (الاسم، البريد، الجوال، التاريخ)'); return; }
            const pricePer = nationality === 'egyptian' ? tourData.priceEgyptian : tourData.priceForeign;
            const total = pricePer * persons;
            const currency = nationality === 'egyptian' ? 'EGP' : 'USD';
            const bookingInfo = { tour: tourData.name, name, email, phone, date, persons, total, currency, nationality };
            localStorage.setItem('lastBooking', JSON.stringify(bookingInfo));
            alert(`✅ تم إرسال طلب الحجز بنجاح!\n📌 اسم الرحلة: ${tourData.name}\n👤 ${name}\n💰 الإجمالي: ${total} ${currency}\nسنتواصل معك خلال 30 دقيقة عبر واتساب.`);
            // Simulate sending to API
            fetch('/api/bookings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(bookingInfo) }).catch(err=>console.log);
        }
        
        // Language System (Arabic/English toggle)
        const translations = { ar: { logo: "رحلة في مصر", nav_home: "الرئيسية", nav_tours: "الجولات", nav_contact: "اتصل بنا", itinerary: "برنامج الرحلة", inclusions: "يشمل / لا يشمل", reviews: "تقييمات العملاء", faq: "الأسئلة الشائعة", bookNow: "📅 احجز الآن", secure: "دفع آمن", instant: "حجز فوري", support: "دعم 24/7", rating: "تقييمات عالية", copyright: "© 2026 رحلة في مصر مع سيمون - جولات استثنائية" }, en: { logo: "Journey in Egypt", nav_home: "Home", nav_tours: "Tours", nav_contact: "Contact", itinerary: "Tour Itinerary", inclusions: "Inclusions / Exclusions", reviews: "Customer Reviews", faq: "FAQs", bookNow: "📅 Book Now", secure: "Secure Payment", instant: "Instant Booking", support: "24/7 Support", rating: "High Ratings", copyright: "© 2026 Journey in Egypt with Simon - Exceptional Tours" } };
        let currentLang = localStorage.getItem('language') || 'ar';
        function updateUILanguage() {
            document.querySelectorAll('[data-key]').forEach(el => { const key = el.dataset.key; if(translations[currentLang][key]) el.innerText = translations[currentLang][key]; });
            document.getElementById('langBtn').innerHTML = currentLang === 'ar' ? '🇬🇧 EN' : '🇸🇦 AR';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        }
        document.getElementById('langBtn').addEventListener('click', () => { currentLang = currentLang === 'ar' ? 'en' : 'ar'; localStorage.setItem('language', currentLang); updateUILanguage(); });
        
        // Dark Mode
        function initDarkModeUI() {
            const darkBtn = document.getElementById('darkModeBtn');
            const isDark = localStorage.getItem('darkMode') === 'true';
            if(isDark) document.body.classList.add('dark-mode');
            darkBtn.addEventListener('click', () => { document.body.classList.toggle('dark-mode'); localStorage.setItem('darkMode', document.body.classList.contains('dark-mode')); });
        }
        
        // Mobile menu toggle
        document.querySelector('.nav-toggle').addEventListener('click', () => { document.querySelector('.nav-menu').classList.toggle('active'); });
        
        // Sticky booking enhancement (additional small ux)
        function enhanceSticky() {
            const sticky = document.querySelector('.sticky-card');
            if(window.innerWidth > 992) { window.addEventListener('scroll', () => { if(window.scrollY > 200) sticky.style.transform = 'translateY(-5px)'; else sticky.style.transform = 'translateY(0)'; }); }
        }
        
        // Initialize all
        window.onload = () => {
            renderGallery(tourData.images);
            renderItinerary(tourData.itinerary);
            renderInclusions(tourData.includes, tourData.excludes);
            renderReviews(tourData.reviews);
            renderFAQ(tourData.faq);
            updatePriceDisplay();
            document.getElementById('nationalitySticky').addEventListener('change', updatePriceDisplay);
            document.getElementById('bookingFormSticky').addEventListener('submit', handleBooking);
            initDarkModeUI();
            updateUILanguage();
            enhanceSticky();
        };
    </script>
</body>
</html>
