<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تفاصيل الرحلة - رحلة في مصر | اكتشف عظمة الفراعنة</title>
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Vv4ZY0nw/Logo.webp">
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/Vv4ZY0nw/Logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #D4AF37, #B8860B);
            --secondary-gradient: linear-gradient(135deg, #2c1810, #5c2e1a);
            --bg-gradient: linear-gradient(135deg, #faf6e9 0%, #f0e6d2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #2c1810;
            --text-secondary: #5c3a2a;
            --border-color: rgba(212, 175, 55, 0.3);
            --shadow: 0 20px 40px rgba(0,0,0,0.1);
            --navbar-bg: rgba(44, 24, 16, 0.97);
            --footer-bg: #1a0f0a;
        }
        
        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: rgba(30, 30, 50, 0.95);
            --text-primary: #f0e6d2;
            --text-secondary: #d4a373;
            --border-color: rgba(212, 175, 55, 0.5);
            --navbar-bg: rgba(10, 10, 20, 0.98);
            --footer-bg: #0a0a15;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: all 0.3s ease;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--text-secondary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--navbar-bg);
            backdrop-filter: blur(15px);
            z-index: 1000;
            padding: 0.8rem 0;
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--border-color);
        }
        
        .navbar.scrolled { padding: 0.5rem 0; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }
        
        .nav-logo { display: flex; align-items: center; gap: 0.8rem; }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #D4AF37; }
        .logo-text { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #D4AF37, #FFD700); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .nav-menu { display: flex; list-style: none; gap: 2rem; }
        .nav-menu a { color: var(--text-primary); text-decoration: none; font-weight: 500; transition: all 0.3s; position: relative; }
        .nav-menu a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #D4AF37, #FFD700); transition: width 0.3s; }
        .nav-menu a:hover::after, .nav-menu a.active::after { width: 100%; }
        
        .nav-controls { display: flex; gap: 1rem; align-items: center; }
        .icon-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--border-color); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-primary); transition: all 0.3s; }
        .icon-btn:hover { background: #D4AF37; color: #2c1810; transform: scale(1.05); }
        .lang-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--border-color); border-radius: 25px; padding: 0.3rem 1rem; font-weight: 600; cursor: pointer; color: var(--text-primary); transition: all 0.3s; }
        .lang-btn:hover { background: #D4AF37; color: #2c1810; }
        .nav-toggle { display: none; cursor: pointer; }
        .nav-toggle span { display: block; width: 25px; height: 3px; background: #D4AF37; margin: 5px 0; transition: 0.3s; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 6rem 2rem 4rem; }
        
        .tour-detail-card {
            background: var(--card-bg);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }
        
        .tour-header-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
        }
        
        .tour-content { padding: 2rem; }
        
        .tour-title { font-size: 2.5rem; margin-bottom: 1rem; color: #D4AF37; }
        
        .tour-meta {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
            flex-wrap: wrap;
        }
        
        .tour-meta-item { display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); }
        .tour-meta-item i { color: #D4AF37; font-size: 1.2rem; }
        
        .tour-description {
            line-height: 1.8;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }
        
        .pricing-section {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(184, 134, 11, 0.05));
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        
        .price-card {
            text-align: center;
            padding: 1rem;
            flex: 1;
            min-width: 150px;
        }
        
        .price-card h3 { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.5rem; }
        .price-card .price { font-size: 2rem; font-weight: 800; color: #D4AF37; }
        
        .booking-form-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid var(--border-color);
        }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #D4AF37;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            color: #2c1810;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        
        .back-btn {
            display: inline-block;
            background: var(--text-secondary);
            color: #fff;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            text-decoration: none;
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        .back-btn:hover { opacity: 0.8; transform: translateX(-5px); }
        
        footer { background: var(--footer-bg); color: #fff; text-align: center; padding: 2rem; margin-top: 2rem; }
        
        .whatsapp-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: #25D366;
            color: #fff;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
            z-index: 1000;
            text-decoration: none;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }
        
        .whatsapp-btn:hover { transform: scale(1.1); }
        
        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            .nav-menu { position: fixed; right: -100%; top: 70px; flex-direction: column; background: var(--navbar-bg); backdrop-filter: blur(15px); width: 100%; text-align: center; transition: 0.3s; padding: 2rem 0; gap: 1.5rem; }
            .nav-menu.active { right: 0; }
            .tour-title { font-size: 1.8rem; }
            .tour-header-image { height: 300px; }
            .container { padding: 5rem 1rem 2rem; }
            .pricing-section { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="https://i.postimg.cc/Vv4ZY0nw/Logo.webp" alt="Logo" class="logo-img">
                <span class="logo-text" data-key="logo">رحلة في مصر</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" data-key="nav_home">الرئيسية</a></li>
                <li><a href="index.html#about" data-key="nav_about">نبذة عنا</a></li>
                <li><a href="index.html#tours" data-key="nav_tours">الجولات</a></li>
                <li><a href="index.html#gallery" data-key="nav_gallery">المعرض</a></li>
                <li><a href="rate.html" data-key="nav_ratings">التقييمات</a></li>
                <li><a href="index.html#contact" data-key="nav_contact">اتصل بنا</a></li>
            </ul>
            <div class="nav-controls">
                <button class="icon-btn" id="darkModeBtn"><i class="fas fa-moon"></i></button>
                <button class="lang-btn" id="langBtn">🇬🇧 EN</button>
                <div class="nav-toggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <a href="index.html#tours" class="back-btn"><i class="fas fa-arrow-right"></i> العودة إلى الجولات</a>
        
        <div id="tourDetailContainer">
            <div style="text-align: center; padding: 3rem;"><i class="fas fa-spinner fa-spin fa-2x"></i><br>جاري تحميل تفاصيل الرحلة...</div>
        </div>
        
        <div class="booking-form-container" id="bookingSection" style="display: none;">
            <h2 style="margin-bottom: 1.5rem; color: #D4AF37;">📝 احجز الآن</h2>
            <form id="bookingForm">
                <div class="form-group"><label>الاسم الكامل</label><input type="text" id="fullName" required placeholder="أدخل اسمك الكامل"></div>
                <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="email" required placeholder="example@email.com"></div>
                <div class="form-group"><label>رقم الهاتف</label><input type="tel" id="phone" required placeholder="0123456789"></div>
                <div class="form-group"><label>الجنسية</label><select id="nationality" required><option value="">اختر الجنسية</option><option value="egyptian">🇪🇬 مصري / عربي</option><option value="foreign">🌍 أجنبي</option></select></div>
                <div class="form-group"><label>عدد الأفراد</label><input type="number" id="persons" min="1" value="1" required></div>
                <div class="form-group"><label>تاريخ الرحلة</label><input type="date" id="tripDate" required></div>
                <div class="form-group"><label>رسالة إضافية (اختياري)</label><textarea id="message" rows="3" placeholder="أي استفسارات أو طلبات خاصة..."></textarea></div>
                <input type="hidden" id="tourId">
                <input type="hidden" id="tourName">
                <button type="submit" class="submit-btn">✅ تأكيد الحجز</button>
            </form>
        </div>
    </div>

    <a href="https://wa.me/201229971386" class="whatsapp-btn" target="_blank"><i class="fab fa-whatsapp"></i></a>
    
    <footer><div class="container" style="padding: 1rem;"><p data-key="copyright">&copy; 2026 رحلة في مصر مع سيمون. جميع الحقوق محفوظة</p></div></footer>

    <script>
        // Get tour ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const tourId = urlParams.get('id');
        
        let currentTour = null;
        
        // Mobile menu toggle
        const navToggle = document.querySelector('.nav-toggle');
        const navMenu = document.querySelector('.nav-menu');
        if (navToggle) {
            navToggle.addEventListener('click', () => { navMenu.classList.toggle('active'); });
            document.querySelectorAll('.nav-menu a').forEach(link => {
                link.addEventListener('click', () => { navMenu.classList.remove('active'); });
            });
        }
        
        // Dark Mode
        function initDarkMode() {
            const darkModeBtn = document.getElementById('darkModeBtn');
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) { document.body.classList.add('dark-mode'); darkModeBtn.innerHTML = '<i class="fas fa-sun"></i>'; }
            darkModeBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkNow = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkNow);
                darkModeBtn.innerHTML = isDarkNow ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }
        
        // Language System
        const translations = {
            ar: {
                logo: "رحلة في مصر",
                nav_home: "الرئيسية",
                nav_about: "نبذة عنا",
                nav_tours: "الجولات",
                nav_gallery: "المعرض",
                nav_ratings: "التقييمات",
                nav_contact: "اتصل بنا",
                copyright: "© 2026 رحلة في مصر مع سيمون. جميع الحقوق محفوظة"
            },
            en: {
                logo: "Journey in Egypt",
                nav_home: "Home",
                nav_about: "About",
                nav_tours: "Tours",
                nav_gallery: "Gallery",
                nav_ratings: "Ratings",
                nav_contact: "Contact",
                copyright: "© 2026 Journey in Egypt with Simon. All Rights Reserved"
            }
        };
        
        let currentLang = localStorage.getItem('language') || 'ar';
        function updateLanguage() {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[currentLang][key]) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') el.placeholder = translations[currentLang][key];
                    else el.textContent = translations[currentLang][key];
                }
            });
            document.getElementById('langBtn').innerHTML = currentLang === 'ar' ? '🇬🇧 EN' : '🇸🇦 AR';
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;
            localStorage.setItem('language', currentLang);
        }
        
        function initLanguage() {
            document.getElementById('langBtn').addEventListener('click', () => {
                currentLang = currentLang === 'ar' ? 'en' : 'ar';
                updateLanguage();
            });
            updateLanguage();
        }
        
        // Load tour details
        async function loadTourDetails() {
            const container = document.getElementById('tourDetailContainer');
            if (!tourId) {
                container.innerHTML = '<div style="text-align:center; padding:3rem; color:#f44336;"><i class="fas fa-exclamation-triangle"></i> لا توجد رحلة محددة</div>';
                return;
            }
            
            try {
                const response = await fetch(`/api/tours/${tourId}`);
                if (!response.ok) throw new Error('Tour not found');
                const tour = await response.json();
                currentTour = tour;
                
                displayTourDetails(tour);
                document.getElementById('bookingSection').style.display = 'block';
                document.getElementById('tourId').value = tour.id;
                document.getElementById('tourName').value = tour.name;
                
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div style="text-align:center; padding:3rem; color:#f44336;"><i class="fas fa-exclamation-triangle"></i> حدث خطأ في تحميل تفاصيل الرحلة</div>';
            }
        }
        
        function displayTourDetails(tour) {
            const container = document.getElementById('tourDetailContainer');
            const defaultImage = 'https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80';
            
            container.innerHTML = `
                <div class="tour-detail-card">
                    <img src="${escapeHtml(tour.image || defaultImage)}" alt="${escapeHtml(tour.name)}" class="tour-header-image" onerror="this.src='${defaultImage}'">
                    <div class="tour-content">
                        <h1 class="tour-title">✨ ${escapeHtml(tour.name)} ✨</h1>
                        <div class="tour-meta">
                            <div class="tour-meta-item"><i class="fas fa-calendar-week"></i> <span>${tour.days} أيام / ${tour.days-1} ليالي</span></div>
                            <div class="tour-meta-item"><i class="fas fa-users"></i> <span>جولات جماعية خاصة</span></div>
                            <div class="tour-meta-item"><i class="fas fa-language"></i> <span>مرشد سياحي متحدث بالعربية والإنجليزية</span></div>
                        </div>
                        <div class="tour-description">
                            <p>${escapeHtml(tour.description)}</p>
                        </div>
                        <div class="pricing-section">
                            <div class="price-card">
                                <h3><i class="fas fa-user"></i> للمصريين / العرب</h3>
                                <div class="price">${tour.priceEgyptian} جنيه</div>
                                <small>للشخص الواحد</small>
                            </div>
                            <div class="price-card">
                                <h3><i class="fas fa-globe"></i> للأجانب</h3>
                                <div class="price">${tour.priceForeign} $</div>
                                <small>للشخص الواحد</small>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
// Handle booking submission
const bookingForm = document.getElementById('bookingForm');
if (bookingForm) {
    bookingForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = bookingForm.querySelector('.submit-btn');
        const originalText = submitBtn.textContent;
        submitBtn.disabled = true;
        submitBtn.textContent = 'جاري المعالجة...';
        
        const nationality = document.getElementById('nationality').value;
        const persons = parseInt(document.getElementById('persons').value);
        const tourIdVal = document.getElementById('tourId').value;
        const tourNameVal = document.getElementById('tourName').value;
        
        if (!nationality) {
            alert('❌ الرجاء اختيار الجنسية');
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            return;
        }
        
        // Get price from current tour or default
        let pricePerPerson = nationality === 'egyptian' ? 2500 : 50;
        if (currentTour) {
            pricePerPerson = nationality === 'egyptian' ? currentTour.priceEgyptian : currentTour.priceForeign;
        }
        
        const totalPrice = pricePerPerson * persons;
        const currency = nationality === 'egyptian' ? 'EGP' : 'USD';
        
        const bookingData = {
            tourId: tourIdVal,
            tourName: tourNameVal,
            name: document.getElementById('fullName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            nationality: nationality,
            persons: persons,
            date: document.getElementById('tripDate').value,
            message: document.getElementById('message').value || '',
            totalPrice: totalPrice,
            currency: currency
        };
        
        // Validation
        if (!bookingData.name || !bookingData.email || !bookingData.phone || !bookingData.date) {
            alert('❌ الرجاء تعبئة جميع الحقول المطلوبة');
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
            return;
        }
        
        try {
            const response = await fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            });
            
            const result = await response.json();
            
            if (response.ok) {
                // ✅ حفظ بيانات الحجز في localStorage عشان صفحة الدفع
                const paymentData = {
                    bookingId: result.booking?.id || Date.now().toString(),
                    name: bookingData.name,
                    email: bookingData.email,
                    phone: bookingData.phone,
                    tour: bookingData.tourName,
                    persons: persons,
                    date: bookingData.date,
                    totalPrice: totalPrice,
                    currency: currency,
                    nationality: nationality,
                    transferNumber: result.booking?.transferNumber || 'TR-' + Date.now()
                };
                localStorage.setItem('bookingData', JSON.stringify(paymentData));
                
                // ✅ التوجيه لصفحة الدفع
                window.location.href = '/pay';
            } else {
                alert('❌ حدث خطأ في تأكيد الحجز: ' + (result.error || 'يرجى المحاولة مرة أخرى'));
            }
        } catch(error) {
            console.error('Booking error:', error);
            alert('❌ حدث خطأ في الاتصال بالخادم. يرجى المحاولة مرة أخرى.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = originalText;
        }
    });
}
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });
        
        initDarkMode();
        initLanguage();
        loadTourDetails();
    </script>
</body>
</html>
