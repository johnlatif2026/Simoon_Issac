<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الفاتورة - تأكيد الحجز | رحلة في مصر</title>
    <link rel="apple-touch-icon" href="https://i.postimg.cc/d0Pfc81d/Logo.jpg">
  <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/d0Pfc81d/Logo.jpg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #D4AF37, #B8860B);
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-primary: #2c1810;
            --text-secondary: #5c3a2a;
            --border-color: #e0d5c0;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: #2d2d44;
            --text-primary: #f0e6d2;
            --text-secondary: #d4a373;
            --border-color: #3d3d5c;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 2rem;
            transition: all 0.3s ease;
        }
        
        .invoice-container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .invoice-card {
            background: var(--card-bg);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        
        .invoice-header {
            background: linear-gradient(135deg, #2c1810, #5c2e1a);
            color: #D4AF37;
            padding: 2rem;
            text-align: center;
        }
        
        .invoice-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .invoice-body {
            padding: 2rem;
        }
        
        .booking-details {
            background: rgba(212, 175, 55, 0.08);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }
        
        .booking-details h3 {
            color: #D4AF37;
            margin-bottom: 1rem;
            border-right: 4px solid #D4AF37;
            padding-right: 1rem;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.8rem 0;
            border-bottom: 1px dashed var(--border-color);
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .detail-value {
            color: var(--text-secondary);
        }
        
        .price-section {
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .price-section h3 {
            color: #2c1810;
            margin-bottom: 0.5rem;
        }
        
        .total-price {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2c1810;
        }
        
        .price-note {
            font-size: 0.8rem;
            color: #2c1810;
            opacity: 0.8;
        }
        
        .mobileCash-section {
            background: linear-gradient(135deg, #FF8C00, #D4AF37);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .mobileCash-section h3 {
            color: #2c1810;
            margin-bottom: 0.5rem;
        }
        
        .mobileCash-section p {
            color: #2c1810;
        }
        
        .mobile-cash-number,
        .ref-number {
            background: #fff;
            padding: 1rem;
            border-radius: 15px;
            margin: 1rem 0;
            font-size: 1.3rem;
            font-weight: bold;
            direction: ltr;
            color: #2c1810;
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        .copy-btn {
            background: #2c1810;
            color: #D4AF37;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .copy-btn:hover {
            background: #1a0f0a;
            transform: scale(0.98);
        }
        
        .beneficiary {
            margin-top: 1rem;
            font-weight: bold;
        }
        
        .actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        
        .btn-primary,
        .btn-secondary {
            flex: 1;
            padding: 1rem;
            border-radius: 15px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #25D366;
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }
        
        .btn-secondary {
            background: #2c1810;
            color: #fff;
        }
        
        .btn-secondary:hover {
            background: #1a0f0a;
            transform: translateY(-2px);
        }
        
        .info-note {
            background: rgba(255, 255, 255, 0.3);
            border-right: 4px solid #fff;
            padding: 1rem;
            border-radius: 15px;
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: right;
            color: #2c1810;
        }
        
        .loading {
            text-align: center;
            padding: 3rem;
            color: #fff;
        }
        
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            font-size: 1.2rem;
            transition: all 0.3s;
            z-index: 1000;
        }
        
        .dark-mode-toggle:hover {
            background: #D4AF37;
            transform: scale(1.05);
        }
        
        @media (max-width: 600px) {
            body {
                padding: 1rem;
            }
            .total-price {
                font-size: 1.8rem;
            }
            .actions {
                flex-direction: column;
            }
            .invoice-header h1 {
                font-size: 1.3rem;
            }
            .detail-row {
                flex-direction: column;
                gap: 0.3rem;
            }
        }
    </style>
</head>
<body>
    <button class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>
    <div class="invoice-container" id="invoiceContainer">
        <div class="loading">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p>جاري تحضير الفاتورة...</p>
        </div>
    </div>

    <script>
        function initDarkMode() {
            const btn = document.getElementById('darkModeToggle');
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
                btn.innerHTML = '<i class="fas fa-sun"></i>';
            }
            btn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkNow = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkNow);
                btn.innerHTML = isDarkNow ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }
        
        const bookingData = JSON.parse(localStorage.getItem('bookingData') || '{}');
        let bookingId = null;
        
        if (!bookingData.name || !bookingData.tour || !bookingData.email) {
            window.location.href = '/';
        }
        
        history.pushState(null, null, location.href);
        window.onpopstate = function () { history.go(1); };
        
        const mobileCashNumber = '01026517329';
        
        async function generateInvoice() {
            const total = bookingData.totalPrice || 0;
            const currency = bookingData.currency || 'USD';
            const nationality = bookingData.nationality || 'foreign';
            const nationalityText = nationality === 'egyptian' ? '🇪🇬 مصري / عربي' : '🌍 أجنبي';
            const transferNumber = 'REF' + Date.now() + Math.floor(Math.random() * 10000);
            
            const html = `
                <div class="invoice-card">
                    <div class="invoice-header">
                        <h1><i class="fas fa-receipt"></i> فاتورة الحجز</h1>
                        <p>✨ شكراً لاختياركم رحلة في مصر ✨</p>
                    </div>
                    <div class="invoice-body">
                        <div class="booking-details">
                            <h3><i class="fas fa-user"></i> بيانات الحجز</h3>
                            <div class="detail-row"><span class="detail-label">الاسم:</span><span class="detail-value">${escapeHtml(bookingData.name || '')}</span></div>
                            <div class="detail-row"><span class="detail-label">البريد الإلكتروني:</span><span class="detail-value">${escapeHtml(bookingData.email || '')}</span></div>
                            <div class="detail-row"><span class="detail-label">رقم الهاتف:</span><span class="detail-value">${escapeHtml(bookingData.phone || '')}</span></div>
                            <div class="detail-row"><span class="detail-label">الجولة:</span><span class="detail-value">${escapeHtml(bookingData.tour || '')}</span></div>
                            <div class="detail-row"><span class="detail-label">الجنسية:</span><span class="detail-value">${nationalityText}</span></div>
                            <div class="detail-row"><span class="detail-label">عدد الأفراد:</span><span class="detail-value">${bookingData.persons || '1'} شخص</span></div>
                            <div class="detail-row"><span class="detail-label">تاريخ الحجز:</span><span class="detail-value">${bookingData.date || ''}</span></div>
                        </div>
                        
                        <div class="price-section">
                            <h3><i class="fas fa-dollar-sign"></i> إجمالي المبلغ</h3>
                            <div class="total-price">${total} ${currency === 'EGP' ? 'جنيه' : '$'}</div>
                            ${currency === 'USD' ? `<div class="price-note">≈ ${(total * 48).toFixed(2)} جنيه مصري</div>` : `<div class="price-note">≈ ${(total / 48).toFixed(2)} دولار أمريكي</div>`}
                        </div>
                        
                        <div class="mobileCash-section">
                            <h3><i class="fas fa-mobile-alt"></i> التحويل عبر محفظة أورنج كاش</h3>
                            <p>رقم المحفظة:</p>
                            <div class="mobile-cash-number" id="mobileCashNumber">📱 ${mobileCashNumber}</div>
                            <button class="copy-btn" onclick="copyMobileCash()">
                                <i class="fas fa-copy"></i> نسخ رقم المحفظة
                            </button>
                            
                            <div class="beneficiary">
                                <p><strong>👤 اسم المستفيد:</strong> سيمون اسحاق</p>
                                <p><strong>🏦 نوع المحفظة:</strong> أورنج كاش</p>
                            </div>
                            
                            <p style="margin-top: 1rem;"><strong>🔢 رقم التحويل المرجعي:</strong></p>
                            <div class="ref-number" id="refNumber">${transferNumber}</div>
                            <button class="copy-btn" onclick="copyRefNumber()">
                                <i class="fas fa-copy"></i> نسخ الرقم المرجعي
                            </button>
                            
                            <div class="info-note">
                                <i class="fas fa-info-circle"></i>
                                <strong>📋 تعليمات التحويل:</strong><br>
                                1️⃣ افتح تطبيق أورنج كاش<br>
                                2️⃣ اختر "تحويل الأموال"<br>
                                3️⃣ أدخل رقم المحفظة: ${mobileCashNumber}<br>
                                4️⃣ أدخل المبلغ: ${total} ${currency === 'EGP' ? 'جنيه' : 'دولار'}<br>
                                5️⃣ اكتب الرقم المرجعي: ${transferNumber} في رسالة التحويل<br>
                                6️⃣ اضغط على زر التأكيد بعد التحويل ⬇️
                            </div>
                        </div>
                        
                        <div class="actions">
                            <a href="https://wa.me/201026517329?text=مرحباً، تم تحويل مبلغ ${total} ${currency === 'EGP' ? 'جنيه' : 'دولار'} عبر أورنج كاش للحجز باسم ${escapeHtml(bookingData.name)} والرقم المرجعي ${transferNumber}" class="btn-primary" target="_blank">
                                <i class="fab fa-whatsapp"></i> إرسال إيصال التحويل
                            </a>
                            <button onclick="confirmPayment('${transferNumber}')" class="btn-secondary">
                                <i class="fas fa-check"></i> تأكيد الدفع
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('invoiceContainer').innerHTML = html;
            bookingId = await sendBookingToServer(bookingData, total, transferNumber);
        }
        
        async function sendBookingToServer(data, total, transferNumber) {
            const bookingToSend = {
                name: data.name,
                email: data.email,
                phone: data.phone,
                tour: data.tour,
                nationality: data.nationality,
                persons: parseInt(data.persons),
                date: data.date,
                message: data.message || '',
                transferNumber: transferNumber,
                totalAmount: total,
                currency: data.currency,
                paymentMethod: 'Orange Cash',
                createdAt: new Date().toISOString(),
                paymentStatus: 'pending'
            };
            try {
                const response = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingToSend)
                });
                const result = await response.json();
                return result.id;
            } catch (error) { 
                console.error('Error:', error);
                return null;
            }
        }
        
async function confirmPayment(transferNumber) {
    const btn = document.querySelector('.btn-secondary');
    if (!btn) return;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التأكيد...';
    
            try {
                const response = await fetch('/api/confirm-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bookingId: bookingId,
                        email: bookingData.email,
                        name: bookingData.name,
                        tour: bookingData.tour,
                        persons: bookingData.persons,
                        date: bookingData.date,
                        totalAmount: bookingData.totalPrice,
                        currency: bookingData.currency,
                        transferNumber: transferNumber
                    })
                });
                
                if (response.ok) {
                    localStorage.removeItem('bookingData');
                    alert('✅ تم تأكيد الدفع بنجاح! سيصلك إيميل التأكيد قريباً.');
                    window.location.href = '/';
                } else {
                    alert('❌ حدث خطأ في تأكيد الدفع. يرجى المحاولة مرة أخرى أو التواصل مع الدعم.');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check"></i> تأكيد الدفع';
                }
            } catch (error) {
                console.error('Error:', error);
                alert('❌ حدث خطأ في الاتصال بالخادم');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check"></i> تأكيد الدفع';
            }
        }
        
        function copyMobileCash() {
            const text = document.getElementById('mobileCashNumber').innerText.replace('📱 ', '');
            navigator.clipboard.writeText(text);
            alert('✅ تم نسخ رقم المحفظة: ' + text);
        }
        
        function copyRefNumber() {
            const text = document.getElementById('refNumber').innerText;
            navigator.clipboard.writeText(text);
            alert('✅ تم نسخ الرقم المرجعي: ' + text);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        initDarkMode();
        generateInvoice();
    </script>
</body>
</html>
