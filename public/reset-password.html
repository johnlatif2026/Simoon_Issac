<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>إعادة تعيين كلمة المرور | رحلة في مصر</title>
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Vv4ZY0nw/Logo.webp">
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/Vv4ZY0nw/Logo.webp">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #D4AF37, #B8860B);
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
            --text-primary: #2c1810;
            --text-secondary: #5c3a2a;
            --shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: rgba(30, 30, 50, 0.98);
            --text-primary: #f0e6d2;
            --text-secondary: #d4a373;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            transition: background 0.3s ease;
        }
        
        .reset-container {
            width: 100%;
            max-width: 500px;
        }
        
        .reset-card {
            background: var(--card-bg);
            border-radius: 30px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .reset-logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 1rem;
            border: 3px solid #D4AF37;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .reset-header h2 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .reset-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .form-group {
            margin-bottom: 1.2rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 600;
        }
        
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-group .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #D4AF37;
            font-size: 1.1rem;
            pointer-events: none;
            z-index: 2;
        }
        
        .input-group input {
            width: 100%;
            padding: 1rem 3rem 1rem 3rem;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            background: transparent;
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }
        
        .toggle-password {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #D4AF37;
            font-size: 1.1rem;
            transition: all 0.3s;
            z-index: 2;
        }
        
        .toggle-password:hover {
            color: #FF8C00;
        }
        
        .reset-btn {
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            color: #2c1810;
            border: none;
            padding: 1rem;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        
        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .message {
            padding: 0.8rem;
            border-radius: 12px;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        
        .error-message {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: #fff;
        }
        
        .success-message {
            background: linear-gradient(135deg, #4caf50, #388e3c);
            color: #fff;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
        }
        
        .back-link a {
            color: #D4AF37;
            text-decoration: none;
            font-weight: 600;
        }
        
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            color: #fff;
            font-size: 1.3rem;
            transition: all 0.3s;
        }
        
        .dark-mode-toggle:hover {
            background: #D4AF37;
            transform: scale(1.05);
        }
        
        .strength-meter {
            margin-top: 8px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 2px;
        }
        
        .strength-text {
            font-size: 11px;
            margin-top: 5px;
            color: var(--text-secondary);
        }
        
        @media (max-width: 500px) {
            body {
                padding: 1rem;
            }
            .reset-card {
                padding: 1.8rem;
            }
            .reset-header h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <button class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>
    
    <div class="reset-container">
        <div class="reset-card">
            <div class="reset-header">
                <img src="https://i.postimg.cc/Vv4ZY0nw/Logo.webp" alt="Logo" class="reset-logo">
                <h2>🔐 إعادة تعيين كلمة المرور</h2>
                <p>أدخل كلمة المرور الجديدة</p>
            </div>
            <form id="resetForm">
                <div class="form-group">
                    <label>كلمة المرور الجديدة</label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="newPassword" placeholder="أدخل كلمة المرور الجديدة" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                    <div class="strength-meter">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>
                <div class="form-group">
                    <label>تأكيد كلمة المرور الجديدة</label>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="confirmPassword" placeholder="أعد إدخال كلمة المرور" required>
                        <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
                    </div>
                </div>
                <button type="submit" class="reset-btn">
                    <i class="fas fa-save"></i> تغيير كلمة المرور
                </button>
                <div id="resetMessage" class="message"></div>
            </form>
            <div class="back-link">
                <a href="login"><i class="fas fa-arrow-right"></i> العودة إلى تسجيل الدخول</a>
            </div>
        </div>
    </div>

    <script>
        function initDarkMode() {
            const btn = document.getElementById('darkModeToggle');
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
                btn.innerHTML = '<i class="fas fa-sun"></i>';
            }
            btn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkNow = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkNow);
                btn.innerHTML = isDarkNow ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }
        
        function initPasswordToggle() {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('newPassword');
            
            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function() {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    this.classList.toggle('fa-eye-slash');
                });
            }
            
            const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            
            if (toggleConfirmPassword && confirmPasswordInput) {
                toggleConfirmPassword.addEventListener('click', function() {
                    const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    confirmPasswordInput.setAttribute('type', type);
                    this.classList.toggle('fa-eye-slash');
                });
            }
        }
        
        function checkPasswordStrength(password) {
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');
            
            if (!password) {
                strengthBar.style.width = '0%';
                strengthBar.style.backgroundColor = '#ddd';
                strengthText.textContent = '';
                return;
            }
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            const strengths = {
                1: { width: '20%', color: '#ff4444', text: 'ضعيفة' },
                2: { width: '40%', color: '#ff8844', text: 'متوسطة' },
                3: { width: '60%', color: '#ffcc00', text: 'جيدة' },
                4: { width: '80%', color: '#88ff44', text: 'قوية' },
                5: { width: '100%', color: '#00cc44', text: 'قوية جداً' }
            };
            
            const level = Math.min(Math.floor(strength), 5);
            const strengthInfo = strengths[level] || strengths[1];
            
            strengthBar.style.width = strengthInfo.width;
            strengthBar.style.backgroundColor = strengthInfo.color;
            strengthText.textContent = `قوة كلمة المرور: ${strengthInfo.text}`;
        }
        
        // الحصول على التوكن من الرابط
        function getTokenFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('token');
        }
        
        const resetForm = document.getElementById('resetForm');
        if (resetForm) {
            const newPasswordInput = document.getElementById('newPassword');
            if (newPasswordInput) {
                newPasswordInput.addEventListener('input', (e) => {
                    checkPasswordStrength(e.target.value);
                });
            }
            
            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const token = getTokenFromUrl();
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const messageDiv = document.getElementById('resetMessage');
                const submitBtn = resetForm.querySelector('button[type="submit"]');
                
                if (!token) {
                    messageDiv.textContent = '❌ رابط إعادة التعيين غير صالح';
                    messageDiv.className = 'message error-message';
                    messageDiv.style.display = 'block';
                    setTimeout(() => window.location.href = 'login', 3000);
                    return;
                }
                
                if (newPassword !== confirmPassword) {
                    messageDiv.textContent = '❌ كلمة المرور وتأكيدها غير متطابقين';
                    messageDiv.className = 'message error-message';
                    messageDiv.style.display = 'block';
                    setTimeout(() => messageDiv.style.display = 'none', 3000);
                    return;
                }
                
                if (newPassword.length < 3) {
                    messageDiv.textContent = '❌ كلمة المرور يجب أن تكون 3 أحرف على الأقل';
                    messageDiv.className = 'message error-message';
                    messageDiv.style.display = 'block';
                    setTimeout(() => messageDiv.style.display = 'none', 3000);
                    return;
                }
                
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التغيير...';
                
                try {
                    const response = await fetch('/api/reset-password', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ token, newPassword })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        messageDiv.textContent = '✅ ' + data.message;
                        messageDiv.className = 'message success-message';
                        messageDiv.style.display = 'block';
                        
                        setTimeout(() => {
                            window.location.href = 'login';
                        }, 3000);
                    } else {
                        messageDiv.textContent = '❌ ' + (data.error || 'حدث خطأ');
                        messageDiv.className = 'message error-message';
                        messageDiv.style.display = 'block';
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = '<i class="fas fa-save"></i> تغيير كلمة المرور';
                        setTimeout(() => messageDiv.style.display = 'none', 4000);
                    }
                } catch (error) {
                    console.error('Error:', error);
                    messageDiv.textContent = '❌ حدث خطأ في الاتصال بالخادم';
                    messageDiv.className = 'message error-message';
                    messageDiv.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-save"></i> تغيير كلمة المرور';
                    setTimeout(() => messageDiv.style.display = 'none', 4000);
                }
            });
        }
        
        initDarkMode();
        initPasswordToggle();
        
        // التحقق من وجود توكن
        if (!getTokenFromUrl()) {
            const messageDiv = document.getElementById('resetMessage');
            if (messageDiv) {
                messageDiv.textContent = '❌ رابط إعادة التعيين غير صالح أو منتهي الصلاحية';
                messageDiv.className = 'message error-message';
                messageDiv.style.display = 'block';
                setTimeout(() => window.location.href = 'login', 3000);
            }
        }
    </script>
</body>
</html>
