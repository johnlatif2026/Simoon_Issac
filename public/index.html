<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تفاصيل الرحلة - رحلة في مصر مع سيمون</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #D4AF37, #B8860B);
            --bg-gradient: linear-gradient(135deg, #faf6e9 0%, #f0e6d2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #2c1810;
            --text-secondary: #5c3a2a;
            --border-color: rgba(212, 175, 55, 0.3);
            --shadow: 0 20px 40px rgba(0,0,0,0.1);
            --shadow-hover: 0 30px 50px rgba(0,0,0,0.15);
            --navbar-bg: rgba(44, 24, 16, 0.97);
            --footer-bg: #1a0f0a;
        }
        
        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: rgba(30, 30, 50, 0.95);
            --text-primary: #f0e6d2;
            --text-secondary: #d4a373;
            --border-color: rgba(212, 175, 55, 0.5);
            --navbar-bg: rgba(10, 10, 20, 0.98);
            --footer-bg: #0a0a15;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            overflow-x: hidden;
            transition: all 0.3s ease;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--text-secondary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 10px; }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(212, 175, 55, 0.3);
            border-top-color: #D4AF37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: var(--navbar-bg);
            backdrop-filter: blur(15px);
            z-index: 1000;
            padding: 0.8rem 0;
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--border-color);
        }
        
        .navbar.scrolled { padding: 0.5rem 0; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }
        
        .nav-logo { display: flex; align-items: center; gap: 0.8rem; }
        .logo-img { width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 2px solid #D4AF37; transition: transform 0.3s; }
        .logo-img:hover { transform: scale(1.05); }
        .logo-text { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #D4AF37, #FFD700); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .nav-menu { display: flex; list-style: none; gap: 2rem; }
        .nav-menu a { color: var(--text-primary); text-decoration: none; font-size: 1rem; font-weight: 500; transition: all 0.3s; position: relative; }
        .nav-menu a::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #D4AF37, #FFD700); transition: width 0.3s; }
        .nav-menu a:hover::after { width: 100%; }
        
        .nav-controls { display: flex; gap: 1rem; align-items: center; }
        .icon-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--border-color); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-primary); transition: all 0.3s; }
        .icon-btn:hover { background: #D4AF37; color: #2c1810; transform: scale(1.05); }
        .lang-btn { background: rgba(212, 175, 55, 0.2); border: 1px solid var(--border-color); border-radius: 25px; padding: 0.3rem 1rem; font-weight: 600; cursor: pointer; color: var(--text-primary); transition: all 0.3s; }
        .lang-btn:hover { background: #D4AF37; color: #2c1810; }
        .nav-toggle { display: none; cursor: pointer; }
        .nav-toggle span { display: block; width: 25px; height: 3px; background: #D4AF37; margin: 5px 0; transition: 0.3s; }
        .nav-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .nav-toggle.active span:nth-child(2) { opacity: 0; }
        .nav-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -6px); }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 4rem 2rem; }
        
        .tour-detail-card {
            background: var(--card-bg);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-top: 2rem;
        }
        
        .tour-detail-image {
            width: 100%;
            height: 500px;
            object-fit: cover;
        }
        
        .tour-detail-content { padding: 2.5rem; }
        
        .tour-detail-title {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .tour-detail-meta {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }
        
        .tour-meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }
        
        .tour-meta-item i { color: #D4AF37; font-size: 1.2rem; }
        
        .tour-description {
            line-height: 1.8;
            margin-bottom: 2rem;
            color: var(--text-secondary);
        }
        
        .tour-itinerary, .tour-included, .tour-excluded {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: rgba(212, 175, 55, 0.05);
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }
        
        .tour-itinerary h3, .tour-included h3, .tour-excluded h3 {
            color: #D4AF37;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .tour-itinerary ul, .tour-included ul, .tour-excluded ul {
            list-style: none;
            padding-right: 1rem;
        }
        
        .tour-itinerary li, .tour-included li, .tour-excluded li {
            padding: 0.5rem 0;
            padding-right: 1.5rem;
            position: relative;
        }
        
        .tour-itinerary li::before {
            content: '📌';
            position: absolute;
            right: 0;
            color: #D4AF37;
        }
        
        .tour-included li::before {
            content: '✅';
            position: absolute;
            right: 0;
            color: #4caf50;
        }
        
        .tour-excluded li::before {
            content: '❌';
            position: absolute;
            right: 0;
            color: #f44336;
        }
        
        .price-section {
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            border-radius: 20px;
            padding: 1.5rem;
            margin: 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .price-box {
            text-align: center;
            flex: 1;
            background: rgba(44, 24, 16, 0.1);
            padding: 1rem;
            border-radius: 15px;
        }
        
        .price-box span { display: block; font-size: 0.9rem; color: #2c1810; margin-bottom: 0.3rem; }
        .price-box strong { font-size: 1.8rem; color: #2c1810; }
        
        .book-now-btn {
            background: #2c1810;
            color: #D4AF37;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .book-now-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: #1a0f0a;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            color: var(--text-primary);
            margin-bottom: 1rem;
            transition: all 0.3s;
        }
        
        .back-btn:hover { background: #D4AF37; color: #2c1810; }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
        }
        
        .modal-content {
            background: var(--card-bg);
            margin: 5% auto;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border-radius: 20px;
            position: relative;
            animation: slideIn 0.3s;
        }
        
        .close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-secondary);
        }
        
        .close:hover { color: #f44336; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--card-bg);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #D4AF37;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            color: #2c1810;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .submit-btn:hover { opacity: 0.9; transform: scale(0.98); }
        
        footer {
            background: var(--footer-bg);
            color: #fff;
            text-align: center;
            padding: 2rem;
            margin-top: 2rem;
        }
        
        @keyframes slideIn {
            from { transform: translateY(-100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @media (max-width: 768px) {
            .nav-toggle { display: block; }
            .nav-menu {
                position: fixed;
                right: -100%;
                top: 70px;
                flex-direction: column;
                background: var(--navbar-bg);
                backdrop-filter: blur(15px);
                width: 100%;
                text-align: center;
                transition: 0.3s;
                padding: 2rem 0;
                gap: 1.5rem;
            }
            .nav-menu.active { right: 0; }
            .tour-detail-image { height: 250px; }
            .tour-detail-title { font-size: 1.8rem; }
            .price-section { flex-direction: column; }
            .container { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay"><div class="loading-spinner"></div></div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="https://i.postimg.cc/d0Pfc81d/Logo.jpg" alt="شعار رحلة في مصر" class="logo-img">
                <span class="logo-text">رحلة في مصر</span>
            </div>
            <ul class="nav-menu">
                <li><a href="/">الرئيسية</a></li>
                <li><a href="/#about">نبذة عنا</a></li>
                <li><a href="/#tours">الجولات</a></li>
                <li><a href="/#gallery">المعرض</a></li>
                <li><a href="/rate">التقييمات</a></li>
                <li><a href="/#contact">اتصل بنا</a></li>
            </ul>
            <div class="nav-controls">
                <button class="icon-btn" id="darkModeBtn"><i class="fas fa-moon"></i></button>
                <div class="nav-toggle"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>

    <div class="container">
        <a href="/" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
        <div id="tourDetailContainer" class="tour-detail-card">
            <div style="text-align:center; padding: 3rem;"><i class="fas fa-spinner fa-spin fa-2x"></i><p>جاري تحميل تفاصيل الرحلة...</p></div>
        </div>
    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>تأكيد الحجز</h2>
            <form id="modalBookingForm">
                <div class="form-group"><input type="text" id="modalName" placeholder="الاسم الكامل" required></div>
                <div class="form-group"><input type="email" id="modalEmail" placeholder="البريد الإلكتروني" required></div>
                <div class="form-group"><input type="tel" id="modalPhone" placeholder="رقم الهاتف" required></div>
                <div class="form-group"><input type="text" id="modalTour" readonly></div>
                <input type="hidden" id="modalTourId">
                <div class="form-group">
                    <select id="modalNationality" required>
                        <option value="">اختر الجنسية</option>
                        <option value="egyptian">مصري / عربي</option>
                        <option value="foreign">أجنبي</option>
                    </select>
                </div>
                <div class="form-group"><input type="number" id="modalPersons" min="1" placeholder="عدد الأفراد" required></div>
                <div class="form-group"><input type="date" id="modalDate" required></div>
                <div class="form-group"><textarea id="modalMessage" rows="3" placeholder="رسالتك"></textarea></div>
                <button type="submit" class="submit-btn">تأكيد الحجز</button>
            </form>
        </div>
    </div>

    <footer><div class="container"><p>© 2026 رحلة في مصر مع سيمون. جميع الحقوق محفوظة</p></div></footer>

    <script>
        window.addEventListener('load', () => {
            document.getElementById('loadingOverlay').style.opacity = '0';
            setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 500);
        });

        const navToggle = document.querySelector('.nav-toggle');
        const navMenu = document.querySelector('.nav-menu');
        if (navToggle) {
            navToggle.addEventListener('click', () => {
                navMenu.classList.toggle('active');
                navToggle.classList.toggle('active');
            });
        }

        document.querySelectorAll('.nav-menu a').forEach(link => {
            link.addEventListener('click', () => {
                navMenu.classList.remove('active');
                if (navToggle) navToggle.classList.remove('active');
            });
        });

        function initDarkMode() {
            const darkModeBtn = document.getElementById('darkModeBtn');
            const isDark = localStorage.getItem('darkMode') === 'true';
            if (isDark) {
                document.body.classList.add('dark-mode');
                darkModeBtn.innerHTML = '<i class="fas fa-sun"></i>';
            }
            darkModeBtn.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDarkNow = document.body.classList.contains('dark-mode');
                localStorage.setItem('darkMode', isDarkNow);
                darkModeBtn.innerHTML = isDarkNow ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            });
        }

        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        function formatItinerary(text) {
            if (!text) return '<li>لا توجد تفاصيل محددة</li>';
            return text.split('\n').filter(line => line.trim()).map(line => `<li>${escapeHtml(line)}</li>`).join('');
        }

        async function loadTourDetails() {
            const container = document.getElementById('tourDetailContainer');
            const urlParams = new URLSearchParams(window.location.search);
            const tourId = urlParams.get('id');
            
            if (!tourId) {
                container.innerHTML = '<div style="text-align:center; padding: 3rem; color: #f44336;"><i class="fas fa-exclamation-triangle"></i> لم يتم تحديد الرحلة</div>';
                return;
            }
            
            try {
                const response = await fetch(`/api/tours/${tourId}`);
                if (!response.ok) throw new Error('Tour not found');
                const tour = await response.json();
                
                const itineraryItems = tour.itinerary ? tour.itinerary.split('\n').filter(l => l.trim()) : ['جولة سياحية مميزة'];
                const includedItems = tour.included ? tour.included.split('\n').filter(l => l.trim()) : ['مرشد سياحي محترف', 'وجبات غداء', 'تذاكر الدخول'];
                const excludedItems = tour.excluded ? tour.excluded.split('\n').filter(l => l.trim()) : ['تذاكر الطيران', 'الإقامة بالفنادق', 'المشروبات'];
                
                container.innerHTML = `
                    <img src="${escapeHtml(tour.image)}" alt="${escapeHtml(tour.name)}" class="tour-detail-image" onerror="this.src='https://images.unsplash.com/photo-1503177119275-0aa32b3a9368?ixlib=rb-1.2.1&auto=format&fit=crop&w=1950&q=80'">
                    <div class="tour-detail-content">
                        <h1 class="tour-detail-title">${escapeHtml(tour.name)}</h1>
                        <div class="tour-detail-meta">
                            <div class="tour-meta-item"><i class="fas fa-calendar-week"></i> <span>${tour.days} أيام / ${tour.days - 1} ليالي</span></div>
                            <div class="tour-meta-item"><i class="fas fa-users"></i> <span>جولات جماعية خاصة</span></div>
                            <div class="tour-meta-item"><i class="fas fa-language"></i> <span>مرشد سياحي متعدد اللغات</span></div>
                        </div>
                        <div class="tour-description">
                            <p>${escapeHtml(tour.description)}</p>
                        </div>
                        <div class="tour-itinerary">
                            <h3><i class="fas fa-map-marked-alt"></i> برنامج الرحلة</h3>
                            <ul>
                                ${itineraryItems.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="tour-included">
                            <h3><i class="fas fa-check-circle"></i> يشمل السعر</h3>
                            <ul>
                                ${includedItems.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="tour-excluded">
                            <h3><i class="fas fa-times-circle"></i> لا يشمل السعر</h3>
                            <ul>
                                ${excludedItems.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="price-section">
                            <div class="price-box">
                                <span>🇪🇬 السعر للمصريين / العرب</span>
                                <strong>${tour.priceEgyptian} جنيه</strong>
                            </div>
                            <div class="price-box">
                                <span>🌍 السعر للأجانب</span>
                                <strong>${tour.priceForeign} $</strong>
                            </div>
                            <button class="book-now-btn" onclick="openBookingModal('${tour.id}', '${escapeHtml(tour.name).replace(/'/g, "\\'")}')">
                                <i class="fas fa-calendar-check"></i> احجز الآن
                            </button>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading tour:', error);
                container.innerHTML = '<div style="text-align:center; padding: 3rem; color: #f44336;"><i class="fas fa-exclamation-triangle"></i> حدث خطأ في تحميل تفاصيل الرحلة</div>';
            }
        }

        const modal = document.getElementById('bookingModal');
        const closeBtn = document.querySelector('.close');
        
        window.openBookingModal = function(tourId, tourName) {
            if (modal) {
                document.getElementById('modalTour').value = tourName;
                document.getElementById('modalTourId').value = tourId;
                modal.style.display = 'block';
            }
        };
        
        if (closeBtn) closeBtn.onclick = () => modal.style.display = 'none';
        window.onclick = (event) => { if (event.target == modal) modal.style.display = 'none'; };

        const modalBookingForm = document.getElementById('modalBookingForm');
        if (modalBookingForm) {
            modalBookingForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const submitBtn = modalBookingForm.querySelector('.submit-btn');
                const originalText = submitBtn.textContent;
                submitBtn.disabled = true;
                submitBtn.textContent = 'جاري المعالجة...';
                
                const nationality = document.getElementById('modalNationality')?.value;
                const persons = parseInt(document.getElementById('modalPersons')?.value) || 1;
                const tourName = document.getElementById('modalTour')?.value;
                const tourId = document.getElementById('modalTourId')?.value;
                
                if (!tourId && !tourName) {
                    alert('❌ حدث خطأ: لم يتم تحديد الرحلة');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    return;
                }
                if (!nationality) {
                    alert('❌ الرجاء اختيار الجنسية');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    return;
                }
                
                let pricePerPerson = nationality === 'egyptian' ? 2500 : 50;
                let currency = nationality === 'egyptian' ? 'EGP' : 'USD';
                
                try {
                    const res = await fetch(`/api/tours/${tourId}`);
                    const tour = await res.json();
                    if (tour) {
                        pricePerPerson = nationality === 'egyptian' ? tour.priceEgyptian : tour.priceForeign;
                    }
                } catch(e) {
                    console.log('Using default prices');
                }
                
                const totalPrice = pricePerPerson * persons;
                
                const bookingData = {
                    tourId: tourId,
                    tourName: tourName,
                    name: document.getElementById('modalName').value,
                    email: document.getElementById('modalEmail').value,
                    phone: document.getElementById('modalPhone').value,
                    nationality: nationality,
                    persons: persons,
                    date: document.getElementById('modalDate').value,
                    message: document.getElementById('modalMessage').value || '',
                    totalPrice: totalPrice,
                    currency: currency
                };
                
                if (!bookingData.name || !bookingData.email || !bookingData.phone || !bookingData.date) {
                    alert('❌ الرجاء تعبئة جميع الحقول المطلوبة');
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                    return;
                }
                
                try {
                    const response = await fetch('/api/bookings', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(bookingData)
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        alert(`✅ تم تأكيد حجزك بنجاح!\n\n📋 تفاصيل الحجز:\n🏝️ الرحلة: ${tourName}\n👥 عدد الأفراد: ${persons}\n💰 السعر الإجمالي: ${totalPrice} ${currency === 'EGP' ? 'جنيه' : '$'}\n\nسنقوم بالتواصل معك قريباً لتأكيد التفاصيل.`);
                        modal.style.display = 'none';
                        modalBookingForm.reset();
                    } else {
                        alert('❌ حدث خطأ في تأكيد الحجز: ' + (result.error || 'يرجى المحاولة مرة أخرى'));
                    }
                } catch(error) {
                    console.error('Booking error:', error);
                    alert('❌ حدث خطأ في الاتصال بالخادم');
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalText;
                }
            });
        }

        initDarkMode();
        loadTourDetails();
    </script>
</body>
</html>
