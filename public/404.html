<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - الصفحة غير موجودة</title>
        <style>
          * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
          }
          
          body {
            font-family: 'Cairo', 'Tahoma', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            direction: rtl;
          }
          
          .error-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            margin: 20px;
            animation: fadeIn 0.5s ease-in;
          }
          
          @keyframes fadeIn {
            from {
              opacity: 0;
              transform: translateY(-20px);
            }
            to {
              opacity: 1;
              transform: translateY(0);
            }
          }
          
          .error-code {
            font-size: 120px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
          }
          
          .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
          }
          
          h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
          }
          
          p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
          }
          
          .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
          }
          
          .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            font-family: inherit;
          }
          
          .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
          }
          
          .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
          }
          
          .btn-secondary {
            background: #f0f0f0;
            color: #333;
          }
          
          .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
          }
          
          .pyramids {
            margin-top: 30px;
            font-size: 40px;
            opacity: 0.3;
          }
          
          @media (max-width: 768px) {
            .error-code {
              font-size: 80px;
            }
            
            h1 {
              font-size: 24px;
            }
            
            p {
              font-size: 16px;
            }
            
            .btn {
              padding: 10px 20px;
              font-size: 14px;
            }
          }
        </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">🔍</div>
    <div class="error-code">404</div>
    <h1>عذراً! الصفحة غير موجودة</h1>
    <p>الصفحة التي تبحث عنها غير متوفرة حالياً</p>
    <div class="buttons">
      <a href="/" class="btn btn-primary">الرئيسية</a>
      <a href="javascript:history.back()" class="btn btn-secondary">رجوع</a>
    </div>
  </div>
</body>
</html>
